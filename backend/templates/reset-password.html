{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>StudentNest — Reset Password</title>
    <meta property="og:title" content="StudentNest Reset Password" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />

    <style data-tag="reset-style-sheet">
      html {  line-height: 1.15;}body {  margin: 0;}* {  box-sizing: border-box;  border-width: 0;  border-style: solid;  -webkit-font-smoothing: antialiased;}p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption {  margin: 0;  padding: 0;}button {  background-color: transparent;}button,input,optgroup,select,textarea {  font-family: inherit;  font-size: 100%;  line-height: 1.15;  margin: 0;}button,select {  text-transform: none;}button,[type="button"],[type="reset"],[type="submit"] {  -webkit-appearance: button;  color: inherit;}a {  color: inherit;  text-decoration: inherit;}input {  padding: 2px 4px;}html { scroll-behavior: smooth  }
    </style>
    <style data-tag="default-style-sheet">
      html {
        font-family: Inter;
        font-size: 1rem;
      }
      body {
        font-weight: 400;
        font-style: normal;
        letter-spacing: 0.02em;
        line-height: 1.6;
        color: var(--color-on-surface);
        background: var(--color-surface);
        fill: var(--color-on-surface);
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      data-tag="font"
    />
    <link rel="stylesheet" href="/static/style.css" />

    <style>
      /* Reset password page — centered card layout */
      .reset-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-xl);
        background: var(--color-background);
      }

      .reset-card {
        width: 100%;
        max-width: 440px;
        padding: var(--spacing-3xl);
        border-radius: var(--border-radius-card);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        animation: forgotPanelSlideIn 0.35s ease-out;
      }

      .reset-card .login-form-card-header {
        margin-bottom: var(--spacing-xl);
      }

      .reset-card .login-form-element {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-lg);
      }

      .reset-card .login-form-submit-btn {
        margin-top: var(--spacing-md);
      }

      .reset-success {
        text-align: center;
        padding: var(--spacing-xl) 0;
      }

      .reset-success svg {
        color: var(--color-primary);
        margin-bottom: var(--spacing-md);
      }

      .reset-success .section-title {
        margin-bottom: var(--spacing-sm);
      }

      .reset-error-page {
        text-align: center;
        padding: var(--spacing-xl) 0;
      }

      .reset-error-page svg {
        color: #e74c3c;
        margin-bottom: var(--spacing-md);
      }

      .password-requirements {
        font-size: var(--font-size-xs);
        color: var(--color-on-surface-secondary);
        margin-top: var(--spacing-xs);
      }
    </style>
  </head>
  <body>
    <div class="reset-page">
      <div class="reset-card">

        <!-- Reset Form (shown by default) -->
        <div id="resetFormSection">
          <div class="login-form-card-header">
            <h2 class="section-title">Create New Password</h2>
            <p class="section-subtitle">
              Enter your new password below
            </p>
          </div>
          <form id="resetPasswordForm" class="login-form-element">
            <div id="resetMsg" style="display:none; margin: 0 0 12px 0; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.15); color: rgba(255,255,255,0.92); font-weight: 700;"></div>
            <div class="login-form-group">
              <label for="newPassword" class="login-form-label">
                New Password
              </label>
              <div class="login-form-input-container">
                <div class="login-form-input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                </div>
                <input
                  type="password"
                  id="newPassword"
                  name="newPassword"
                  placeholder="••••••••"
                  required="true"
                  minlength="8"
                  class="login-form-input"
                />
              </div>
              <p class="password-requirements">Must be at least 8 characters</p>
            </div>
            <div class="login-form-group">
              <label for="confirmPassword" class="login-form-label">
                Confirm Password
              </label>
              <div class="login-form-input-container">
                <div class="login-form-input-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                </div>
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="••••••••"
                  required="true"
                  minlength="8"
                  class="login-form-input"
                />
              </div>
            </div>
            <button type="submit" class="login-form-submit-btn btn btn-primary">
              <span class="login-form-btn-text">Reset Password</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </button>
          </form>
        </div>

        <!-- Success Message (hidden by default) -->
        <div id="resetSuccessSection" class="reset-success" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <h2 class="section-title">Password Reset!</h2>
          <p class="section-subtitle">Your password has been updated successfully.</p>
          <a href="/" class="login-form-submit-btn btn btn-primary" style="display: inline-flex; margin-top: var(--spacing-lg); text-decoration: none;">
            <span class="login-form-btn-text">Back to Login</span>
          </a>
        </div>

        <!-- Invalid/Expired Token (hidden by default) -->
        <div id="resetErrorSection" class="reset-error-page" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <h2 class="section-title">Invalid Reset Link</h2>
          <p class="section-subtitle" id="resetErrorMsg">This link is invalid or has expired.</p>
          <a href="/" class="login-form-submit-btn btn btn-primary" style="display: inline-flex; margin-top: var(--spacing-lg); text-decoration: none;">
            <span class="login-form-btn-text">Back to Login</span>
          </a>
        </div>

      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('resetPasswordForm');
        const msg = document.getElementById('resetMsg');
        const formSection = document.getElementById('resetFormSection');
        const successSection = document.getElementById('resetSuccessSection');
        const errorSection = document.getElementById('resetErrorSection');
        const errorMsg = document.getElementById('resetErrorMsg');

        // Grab the token from the URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // If no token in URL, show error right away
        if (!token) {
          formSection.style.display = 'none';
          errorSection.style.display = '';
          errorMsg.textContent = 'No reset token found. Please request a new reset link.';
          return;
        }

        function showMsg(text, isError) {
          msg.textContent = text;
          msg.style.display = 'block';
          msg.style.borderColor = isError ? '#e74c3c' : 'var(--color-primary)';
        }

        form.addEventListener('submit', async function(e) {
          e.preventDefault();

          const password = document.getElementById('newPassword').value;
          const confirm = document.getElementById('confirmPassword').value;

          if (password.length < 8) {
            showMsg('Password must be at least 8 characters.', true);
            return;
          }

          if (password !== confirm) {
            showMsg('Passwords do not match.', true);
            return;
          }

          // Disable the button while submitting
          const btn = form.querySelector('button[type="submit"]');
          btn.disabled = true;
          btn.querySelector('.login-form-btn-text').textContent = 'Resetting...';

          try {
            const res = await fetch('/api/password-reset/confirm/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: token, password: password })
            });

            const data = await res.json();

            if (res.ok) {
              // Show success
              formSection.style.display = 'none';
              successSection.style.display = '';
            } else {
              // Show error in the form or switch to error section
              if (data.message && (data.message.includes('invalid') || data.message.includes('expired'))) {
                formSection.style.display = 'none';
                errorSection.style.display = '';
                errorMsg.textContent = data.message;
              } else {
                showMsg(data.message || 'Something went wrong.', true);
                btn.disabled = false;
                btn.querySelector('.login-form-btn-text').textContent = 'Reset Password';
              }
            }
          } catch (err) {
            showMsg('Network error. Please try again.', true);
            btn.disabled = false;
            btn.querySelector('.login-form-btn-text').textContent = 'Reset Password';
          }
        });
      });
    </script>
  </body>
</html>
