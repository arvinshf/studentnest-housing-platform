<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - StudentNest</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="components/login-form.css">
    <!-- Human-style: Keep UI consistent with login page -->
    <style>
        .reset-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 2rem; }
        .reset-title { font-size: 2rem; margin-bottom: 1rem; text-align: center; }
        .reset-desc { color: #666; margin-bottom: 2rem; text-align: center; }
        .reset-form-group { margin-bottom: 1.5rem; }
        .reset-label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .reset-input { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; }
        .reset-btn { width: 100%; padding: 0.75rem; background: #2d72d9; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .reset-btn:hover { background: #1a4e96; }
        .reset-message { margin-top: 1rem; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1 class="reset-title">Forgot Password?</h1>
        <p class="reset-desc">Enter your account email and we'll send you a link to reset your password.</p>
        <form id="resetForm">
            <div class="reset-form-group">
                <label for="resetEmail" class="reset-label">Email Address</label>
                <input type="email" id="resetEmail" class="reset-input" placeholder="student@university.edu" required>
            </div>
            <button type="submit" class="reset-btn">Send Reset Link</button>
        </form>
        <div id="resetMessage" class="reset-message"></div>
        <div style="margin-top:2rem;text-align:center;">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
    <script>
    // Human-style: Handle form submission and show feedback
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value.trim();
        const msg = document.getElementById('resetMessage');
        msg.textContent = '';
        try {
            const res = await fetch('/api/password-reset/request/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (res.ok) {
                msg.style.color = '#2d72d9';
                msg.textContent = data.message || 'If this email is registered, a reset link will be sent.';
            } else {
                msg.style.color = '#d92d2d';
                msg.textContent = data.message || 'Something went wrong. Please try again.';
            }
        } catch (err) {
            msg.style.color = '#d92d2d';
            msg.textContent = 'Network error. Please try again.';
        }
    });
    </script>
</body>
</html>
